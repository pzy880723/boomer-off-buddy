<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>Meruki Ingest</title>
    <style>
      body { font: 13px -apple-system, system-ui, sans-serif; margin: 0; padding: 14px; width: 320px; color: #111; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      label { display: block; font-size: 12px; color: #555; margin: 8px 0 4px; }
      input { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
      button { margin-top: 10px; width: 100%; padding: 8px; background: #111; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
      .row { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-top: 4px; }
      .ok { color: #16a34a; }
      .err { color: #dc2626; word-break: break-all; }
      .muted { color: #888; font-size: 11px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Meruki → BOOMER OFF</h1>
    <label>上报令牌（在系统的「账号管理」里复制）</label>
    <input id="token" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
    <label>系统地址</label>
    <input id="base" placeholder="https://project--xxx.lovable.app" />
    <button id="save">保存</button>

    <div style="margin-top:12px;border-top:1px solid #eee;padding-top:10px;">
      <div class="row"><span>已发送</span><span id="sent">0</span></div>
      <div class="row"><span>识别为订单</span><span id="rec">0</span></div>
      <div class="row"><span>最后上报</span><span id="last">—</span></div>
      <div class="row"><span>本次新增/更新</span><span id="ins">—</span></div>
      <div id="errBox" class="row" style="display:none;"><span>错误</span><span id="err" class="err"></span></div>
    </div>
    <p class="muted">打开 meruki 任意订单/包裹页面即会自动抓取。无需手动触发。</p>

    <script src="popup.js"></script>
  </body>
</html>
